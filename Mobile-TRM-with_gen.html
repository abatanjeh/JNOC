<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Network Node Map - Auto-Center Search</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
        }
        header {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 15px 25px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            z-index: 100;
        }
        .search-box {
            display: flex;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 4px;
        }
        input {
            padding: 8px 15px;
            border: none;
            background: transparent;
            color: white;
            width: 280px;
            outline: none;
        }
        button {
            background: #38bdf8;
            color: #0b0f19;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #7dd3fc; }
        
        .node circle {
            fill: #334155;
            stroke: #38bdf8;
            stroke-width: 2px;
        }
        .node text {
            font-size: 14px;
            fill: #cbd5e1;
            pointer-events: none;
        }
        .link {
            fill: none;
            stroke: #1e293b;
            stroke-width: 2px;
        }
        /* Highlight Effect */
        .node.found circle {
            fill: #f43f5e;
            stroke: #fff;
            r: 10px;
        }
        .node.found text {
            fill: #fff;
            font-weight: bold;
            font-size: 18px;
        }
        /* Generator Node Styles */
        .node.generator circle {
            fill: #10b981;
            stroke: #047857;
            stroke-width: 3px;
            r: 8px;
        }
        .node.generator text {
            fill: #a7f3d0;
            font-weight: 600;
        }
        /* Generator indicator style */
        .gen-indicator {
            font-size: 12px;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
            fill: #fef3c7;
        }
    </style>
</head>
<body>

<header>
    <style>
        .aurora-text {
            font-weight: 700;
            letter-spacing: 1px;
            /* Create the Aurora Gradient */
            background: linear-gradient(
                90deg, 
                #38bdf8, /* Light Blue */
                #818cf8, /* Indigo */
                #34d399, /* Emerald */
                #38bdf8  /* Back to Blue for seamless loop */
            );
            background-size: 200% auto;
            /* Clip background to text */
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            /* Animation */
            animation: aurora-flow 4s linear infinite;
            /* Soft glow effect */
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.3));
        }

        @keyframes aurora-flow {
            to {
                background-position: 200% center;
            }
        }

        /* Basic layout styling */
        .search-box { margin-top: 5px; }
    </style>

    <div class="aurora-text">Mobile Transmission Map</div>
    <div class="search-box">
        <input type="text" id="nodeSearch" placeholder="Type node name (e.g. HEBR07)">

    </div>
</header>

// Mark generator nodes in the data
markGenerator(treeData);

    const width = window.innerWidth;
    const height = window.innerHeight;

    // Zoom setup
    const zoom = d3.zoom()
        .scaleExtent([0.3, 3])
        .on("zoom", (event) => g.attr("transform", event.transform));

    const svg = d3.select("#canvas").append("svg")
        .attr("width", width)
        .attr("height", height)
        .call(zoom);

    const g = svg.append("g");

    // Layout configuration (Vertical Separation, Horizontal Depth)
    const treeLayout = d3.tree().nodeSize([50, 250]); 
    const root = d3.hierarchy(treeData);
    treeLayout(root);

    // Links
    g.selectAll(".link")
        .data(root.links())
        .enter().append("path")
        .attr("class", "link")
        .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

    // Nodes
    const node = g.selectAll(".node")
        .data(root.descendants())
        .enter().append("g")
        .attr("class", d => {
            // Add 'generator' class if node has type: "generator"
            return d.data.type === "generator" ? "node generator" : "node";
        })
        .attr("transform", d => `translate(${d.y},${d.x})`);

    // Create circles with different sizes for generators
    node.append("circle")
        .attr("r", d => d.data.type === "generator" ? 8 : 6);

    // Create text labels
    node.append("text")
        .attr("dy", "0.35em")
        .attr("x", d => d.children ? -15 : 15)
        .attr("text-anchor", d => d.children ? "end" : "start")
        .text(d => d.data.name)
        .clone(true).lower()
        .attr("stroke", "#0b0f19")
        .attr("stroke-width", 4);

    // Add generator indicator (lightning symbol) inside generator nodes
    node.filter(d => d.data.type === "generator")
        .append("text")
        .attr("class", "gen-indicator")
        .attr("x", 0)
        .attr("y", 0)
        .attr("dy", "0.35em")
        .attr("fill", "#fef3c7")  // Light yellow color
        .attr("font-size", "12px")
        .text("⚡");

    // Center view on load
    svg.call(zoom.transform, d3.zoomIdentity.translate(150, height/2));

    // Search and Center Function
    function triggerSearch() {
        const term = document.getElementById("nodeSearch").value.toUpperCase();
        if (!term) return;

        let targetNode = null;
        
        // Remove old highlights
        d3.selectAll(".node").classed("found", false);

        // Find the node
        node.filter(d => {
            if (d.data.name.toUpperCase() === term) {
                targetNode = d;
                return true;
            }
            return false;
        }).classed("found", true);

        // Animation to Center
        if (targetNode) {
            const scale = 1.5; // Zoom in slightly on find
            const x = targetNode.y;
            const y = targetNode.x;

            svg.transition().duration(1000).call(
                zoom.transform,
                d3.zoomIdentity
                    .translate(width / 2, height / 2) // Center of screen
                    .scale(scale)
                    .translate(-x, -y) // Move target to center
            );
        } else {
            alert("Node not found!");
        }
    }

    // Enable Enter Key for Search
    document.getElementById("nodeSearch").addEventListener("keypress", function(e) {
        if (e.key === 'Enter') triggerSearch();
    });
